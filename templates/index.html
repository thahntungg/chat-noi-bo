<!DOCTYPE html>
<html>
<head>
    <title>Messenger 8A</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5; height: 100vh; display: flex; flex-direction: column;
        }
        /* Header phong cách Messenger */
        .header {
            padding: 10px 15px; background: white; border-bottom: 1px solid #ddd;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 10;
        }
        .header h3 { margin: 0; color: #050505; font-size: 18px; }
        
        /* Khung chat */
        #chat {
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 8px;
        }
        
        /* Bong bóng chat */
        .msg {
            max-width: 75%; padding: 8px 12px; border-radius: 18px;
            font-size: 15px; line-height: 1.4; word-wrap: break-word;
            position: relative;
        }
        .msg.others {
            background-color: #e4e6eb; color: black; align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .msg.me {
            background-color: #0084ff; color: white; align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .sender-name { font-size: 11px; color: #65676b; margin-bottom: 2px; }

        /* Thanh nhập liệu chân trang */
        .input-area {
            padding: 10px; background: white; border-top: 1px solid #ddd;
            display: flex; align-items: center; gap: 10px;
        }
        input {
            flex: 1; padding: 10px 15px; border-radius: 20px;
            border: 1px solid #ddd; background: #f0f2f5; outline: none;
        }
        button {
            background: none; border: none; color: #0084ff;
            font-weight: bold; font-size: 16px; cursor: pointer;
        }
        
        /* Nút Admin ẩn */
        #troll-btn { 
            width: 30px; height: 30px; border-radius: 50%; 
            background: #ff4444; color: white; font-size: 10px; 
            border: none; cursor: pointer; opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="header">
        <h3>Lớp 8A Chat</h3>
        <button id="troll-btn" title="Admin Only">!</button>
    </div>

    <div id="chat">
        </div>

    <div class="input-area">
        <input id="myMessage" type="text" placeholder="Nhắn tin...">
        <button id="sendBtn">Gửi</button>
    </div>

    <script>
        $(document).ready(function() {
            var socket = io();
            var myName = prompt("Tên bạn là gì?", "Bạn");

            socket.on('message', function(data) {
                var parts = data.split(": ");
                var sender = parts[0];
                var text = parts.slice(1).join(": ");
                
                var isMe = (sender === myName);
                var msgClass = isMe ? 'me' : 'others';
                
                var html = '<div style="display: flex; flex-direction: column;' + (isMe ? 'align-items: flex-end;' : '') + '">';
                if (!isMe) html += '<span class="sender-name">' + sender + '</span>';
                html += '<div class="msg ' + msgClass + '">' + text + '</div></div>';
                
                $('#chat').append(html);
                $('#chat').scrollTop($('#chat')[0].scrollHeight);
            });

            $('#sendBtn').on('click', function() {
                var text = $('#myMessage').val();
                if(text) {
                    socket.send(myName + ": " + text);
                    $('#myMessage').val('');
                }
            });

            // Gửi tin bằng phím Enter
            $('#myMessage').keypress(function(e) {
                if(e.which == 13) $('#sendBtn').click();
            });

            $('#troll-btn').on('click', function() {
                socket.emit('troll_all');
            });

            socket.on('execute_troll', function() {
                alert("Admin Tùng đang điều khiển máy bạn!");
                window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
            });
        });
    </script>
</body>
</html>
