<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat class - Kết nối & Chia sẻ 😊</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f2f5; /* Nền xám nhạt Messenger */
            --primary-color: #0084ff; /* Xanh Messenger */
            --text-main: #1c1e21;
            --text-sub: #65676b;
            
            /* Neumorphic Shadows */
            --outer-shadow: 6px 6px 12px #d9dbe0, -6px -6px 12px #ffffff;
            --inner-shadow: inset 3px 3px 6px #d9dbe0, inset -3px -3px 6px #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        /* 1. Màn hình nhập tên (Login Overlay) */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(240, 242, 245, 0.9);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.5s;
        }
        .login-box {
            background: var(--bg-color); padding: 40px; border-radius: 25px;
            box-shadow: var(--outer-shadow); text-align: center; width: 90%; max-width: 400px;
        }
        .login-box h2 { color: var(--primary-color); margin-bottom: 20px; font-weight: 700; }
        .login-box input {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            box-shadow: var(--inner-shadow); background: var(--bg-color); outline: none; margin-bottom: 20px; font-size: 16px;
        }
        .login-box button {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            background: var(--primary-color); color: white; font-weight: 600; cursor: pointer; font-size: 16px;
            box-shadow: 3px 3px 6px rgba(0, 132, 255, 0.3); transition: transform 0.1s;
        }
        .login-box button:active { transform: scale(0.98); }

        /* 2. Main App Container */
        .app-container {
            display: flex; width: 95vw; max-width: 1200px; height: 92vh;
            background: var(--bg-color); border-radius: 25px; box-shadow: var(--outer-shadow); overflow: hidden;
            display: none; /* Ẩn lúc đầu */
        }
        .sidebar { width: 280px; border-right: 1px solid rgba(0,0,0,0.05); display: flex; flex-direction: column; padding: 20px; }
        .sidebar h2 { color: var(--primary-color); font-weight: 700; font-size: 22px; }
        
        .chat-main { flex-grow: 1; display: flex; flex-direction: column; background: white; }
        .chat-header { padding: 15px 25px; border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: space-between; }
        .chat-header h3 { font-size: 18px; font-weight: 600; }

        /* 3. Vùng tin nhắn */
        .messages-container { flex-grow: 1; padding: 20px 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #f9fafb; }
        
        .message-row { display: flex; flex-direction: column; max-width: 75%; }
        .message-row.sent { align-self: flex-end; align-items: flex-end; }
        .message-row.received { align-self: flex-start; align-items: flex-start; }
        
        /* Tên người gửi */
        .sender-name { font-size: 11px; color: var(--text-sub); margin-bottom: 3px; margin-left: 8px; font-weight: 500; }
        .sent .sender-name { display: none; } /* Không hiện tên mình */

        .msg-content { padding: 10px 16px; border-radius: 18px; font-size: 15px; line-height: 1.4; position: relative; word-wrap: break-word; }
        .sent .msg-content { background: var(--primary-color); color: white; border-bottom-right-radius: 4px; }
        .received .msg-content { background: #e4e6eb; color: var(--text-main); border-bottom-left-radius: 4px; }

        /* 4. Vùng nhập liệu */
        .input-area { padding: 15px 25px; background: white; border-top: 1px solid rgba(0,0,0,0.05); display: flex; gap: 10px; align-items: center; position: relative; }
        
        /* Nút Emoji */
        #emoji-btn { font-size: 22px; cursor: pointer; background: none; border: none; outline: none; transition: transform 0.1s; color: #ffca28; }
        #emoji-btn:hover { transform: scale(1.1); }

        .input-wrapper { flex-grow: 1; }
        .input-wrapper input { width: 100%; padding: 12px 20px; border-radius: 20px; border: none; background: #f0f2f5; outline: none; font-size: 15px; }
        
        .send-btn { background: none; border: none; outline: none; color: var(--primary-color); font-size: 22px; cursor: pointer; transition: transform 0.1s; }
        .send-btn:hover { transform: scale(1.1); }
        .send-btn:active { transform: scale(0.9); }

        /* 5. Emoji Picker Container */
        #emoji-picker-container {
            position: absolute; bottom: 70px; left: 25px; z-index: 100;
            display: none; box-shadow: var(--outer-shadow); border-radius: 15px; overflow: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>Chào mừng tới Chat 8A</h2>
            <input type="text" id="username-input" placeholder="Nhập tên của bạn (vd: Tùng 8A)..." maxlength="20">
            <button onclick="joinChat()">Bắt đầu Chat 😊</button>
        </div>
    </div>

    <div class="app-container" id="app-container">
        <div class="sidebar">
            <div style="margin-bottom: 20px;">
                <h2>Chat 8A</h2>
                <p style="font-size: 13px; color: var(--text-sub); margin-top: 5px;">Học tập - Kết nối - Sẻ chia</p>
            </div>
            <div style="background: white; padding: 15px; border-radius: 15px; border: 1px solid #eee;">
                <strong># Phòng chung 8A</strong>
                <p style="font-size: 12px; color: var(--text-sub); margin-top: 3px;">Nơi cả lớp cùng chém gió.</p>
            </div>
        </div>

        <div class="chat-main">
            <div class="chat-header">
                <h3 id="chat-with-title">Phòng chat chung</h3>
                <span style="color: #27ae60; font-size: 13px; font-weight: 500;">● Trực tuyến</span>
            </div>
            
            <div class="messages-container" id="chat-box">
                </div>

            <div class="input-area">
                <button id="emoji-btn">😊</button>
                
                <div id="emoji-picker-container"></div>

                <div class="input-wrapper">
                    <input type="text" id="msg-input" placeholder="Aa" autocomplete="off">
                </div>
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@joypixel/emoji-picker@0.1.3/dist/emoji-picker.min.js"></script>
    
    <script>
        const socket = io();
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('msg-input');
        const loginOverlay = document.getElementById('login-overlay');
        const appContainer = document.getElementById('app-container');
        const emojiBtn = document.getElementById('emoji-btn');
        const emojiPickerContainer = document.getElementById('emoji-picker-container');

        let myName = "";

        // --- Logic Nhập Tên ---
        function joinChat() {
            const nameInput = document.getElementById('username-input');
            myName = nameInput.value.trim();
            if (myName !== "") {
                // Ẩn màn hình nhập tên, hiện màn hình chat
                loginOverlay.style.opacity = '0';
                setTimeout(() => {
                    loginOverlay.style.display = 'none';
                    appContainer.style.display = 'flex';
                    input.focus();
                }, 500);
            } else {
                nameInput.style.boxShadow = "inset 3px 3px 6px #e0b0b0, inset -3px -3px 6px #ffffff";
                nameInput.placeholder = "Bạn cần nhập tên để tiếp tục...";
            }
        }

        // --- Logic Emoji Picker ---
        // Khởi tạo bảng chọn emoji
        const picker = new EmojiPicker({
            target: emojiPickerContainer,
            onEmojiClick: (emoji) => {
                // Thêm emoji vào ô nhập liệu
                input.value += emoji.unicode;
                input.focus();
                // Ẩn bảng chọn sau khi chọn (tùy chọn)
                // emojiPickerContainer.style.display = 'none';
            }
        });

        // Toggle ẩn/hiện bảng emoji
        emojiBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Ngăn sự kiện click lan ra ngoài
            if (emojiPickerContainer.style.display === 'block') {
                emojiPickerContainer.style.display = 'none';
            } else {
                emojiPickerContainer.style.display = 'block';
            }
        });

        // Ẩn emoji picker khi click ra ngoài vùng chat
        document.addEventListener('click', (e) => {
            if (!emojiPickerContainer.contains(e.target) && e.target !== emojiBtn) {
                emojiPickerContainer.style.display = 'none';
            }
        });


        // --- Logic Nhắn Tin ---
        function sendMessage() {
            const text = input.value.trim();
            if (text !== "") {
                // Gửi JSON bao gồm TEXT và TÊN NGƯỜI GỬI
                socket.emit('message', {
                    text: text,
                    sender_name: myName
                });
                input.value = '';
                emojiPickerContainer.style.display = 'none'; // Ẩn picker sau khi gửi
            }
        }

        // Nhận dữ liệu từ Backend
        socket.on('render_message', function(data) {
            // data: { 'text': '...', 'sender_name': '...' }
            const isMe = data.sender_name === myName;
            
            // Tạo dòng tin nhắn
            const msgRow = document.createElement('div');
            msgRow.className = `message-row ${isMe ? 'sent' : 'received'}`;
            
            // Cấu trúc: Tên người gửi + Bong bóng tin nhắn
            msgRow.innerHTML = `
                <span class="sender-name">${data.sender_name}</span>
                <div class="msg-content">${data.text}</div>
            `;
            
            chatBox.appendChild(msgRow);
            chatBox.scrollTop = chatBox.scrollHeight; // Tự động cuộn
        });

        // Enter để gửi
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        // Hỗ trợ Enter ở màn hình nhập tên
        document.getElementById('username-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') joinChat();
        });
    </script>
</body>
</html>
