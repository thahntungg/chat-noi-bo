<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat 8A - Kết nối lớp chúng mình</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* (Giữ nguyên các biến CSS và Style cũ của bản Neumorphism trước) */
        :root {
            --bg-color: #e6e9ef;
            --primary-color: #1a73e8;
            --text-main: #2c3e50;
            --outer-shadow: 6px 6px 12px #c8cbd0, -6px -6px 12px #ffffff;
            --inner-shadow: inset 3px 3px 6px #c8cbd0, inset -3px -3px 6px #ffffff;
        }
        /* ... Phần CSS cũ tôi đã tối ưu thêm cho Chat 8A ... */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); height: 100vh; display: flex; justify-content: center; align-items: center; }
        .app-container { display: flex; width: 95vw; max-width: 1400px; height: 92vh; background: var(--bg-color); border-radius: 30px; box-shadow: var(--outer-shadow); overflow: hidden; }
        .sidebar { width: 300px; border-right: 1px solid rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .chat-main { flex-grow: 1; display: flex; flex-direction: column; background: white; }
        .chat-header { padding: 20px 30px; border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: space-between; }
        .messages-container { flex-grow: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #f8f9fb; }
        
        /* Message Bubbles Logic */
        .message-row { display: flex; max-width: 75%; margin-bottom: 5px; }
        .message-row.sent { align-self: flex-end; }
        .message-row.received { align-self: flex-start; }
        
        .msg-content { padding: 12px 18px; border-radius: 18px; font-size: 15px; line-height: 1.4; position: relative; }
        .sent .msg-content { background: var(--primary-color); color: white; border-bottom-right-radius: 4px; box-shadow: 2px 4px 10px rgba(26, 115, 232, 0.3); }
        .received .msg-content { background: white; color: var(--text-main); border-bottom-left-radius: 4px; box-shadow: 2px 2px 5px rgba(0,0,0,0.05); border: 1px solid #eee; }

        .input-area { padding: 20px 30px; background: var(--bg-color); display: flex; gap: 15px; align-items: center; }
        .input-wrapper { flex-grow: 1; }
        .input-wrapper input { width: 100%; padding: 15px 25px; border-radius: 25px; border: none; box-shadow: var(--inner-shadow); background: var(--bg-color); outline: none; }
        .send-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: var(--bg-color); box-shadow: var(--outer-shadow); color: var(--primary-color); cursor: pointer; font-weight: bold; }
        .send-btn:active { box-shadow: var(--inner-shadow); }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div style="padding: 25px;">
                <h2 style="color: var(--primary-color);">Chat 8A</h2>
                <p style="font-size: 12px; color: #7f8c8d; margin-top: 5px;">Thành viên trực tuyến: 1</p>
            </div>
            <div style="padding: 0 15px;">
                <div style="background: white; padding: 15px; border-radius: 15px; box-shadow: 2px 2px 5px rgba(0,0,0,0.02);">
                    <strong># Chung</strong>
                    <p style="font-size: 13px; color: #95a5a6;">Kênh chat chính của lớp</p>
                </div>
            </div>
        </div>

        <div class="chat-main">
            <div class="chat-header">
                <h3>Phòng chat chung lớp 8A</h3>
                <span style="color: #27ae60; font-size: 13px;">● Đang kết nối</span>
            </div>
            
            <div class="messages-container" id="chat-box">
                </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="msg-input" placeholder="Nhập tin nhắn..." autocomplete="off">
                </div>
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script>
        const socket = io();
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('msg-input');

        // Tạo ID ngẫu nhiên cho mỗi máy khi mở web để phân biệt người gửi
        const myId = Math.random().toString(36).substring(2, 9);

        function sendMessage() {
            const text = input.value.trim();
            if (text !== "") {
                socket.emit('message', {
                    text: text,
                    sender_id: myId
                });
                input.value = '';
            }
        }

        socket.on('render_message', function(data) {
            const isMe = data.sender_id === myId;
            const msgRow = document.createElement('div');
            msgRow.className = `message-row ${isMe ? 'sent' : 'received'}`;
            
            msgRow.innerHTML = `<div class="msg-content">${data.text}</div>`;
            
            chatBox.appendChild(msgRow);
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
