<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat 8A - Kết nối</title>
    <style>
        :root { --p: #0084ff; --bg: #f0f2f5; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; justify-content: center; align-items: center; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        
        .container { display: none; width: 95%; max-width: 800px; height: 85vh; background: white; border-radius: 15px; flex-direction: column; overflow: hidden; }
        .msg-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #fafafa; }
        .msg { max-width: 75%; padding: 10px 15px; border-radius: 15px; font-size: 15px; line-height: 1.4; }
        .sent { align-self: flex-end; background: var(--p); color: white; }
        .received { align-self: flex-start; background: #e4e6eb; color: black; }
        .name { font-size: 10px; opacity: 0.7; display: block; margin-bottom: 2px; }

        .input-area { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
        button { background: var(--p); color: white; border: none; padding: 0 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card">
        <h2 style="margin-bottom:15px; color:var(--p)">Chat 8A</h2>
        <input type="text" id="user-in" placeholder="Nhập tên bạn..." style="width:100%; margin-bottom:10px">
        <button onclick="join()" style="width:100%; height:40px">Vào Chat</button>
    </div>
</div>

<div class="container" id="chat-ui">
    <div style="padding:15px; border-bottom:1px solid #eee"><b>Nhóm chat lớp 8A</b></div>
    <div class="msg-box" id="box"></div>
    <div class="input-area">
        <input type="text" id="msg-in" placeholder="Nhập tin nhắn..." autocomplete="off">
        <button onclick="send()">Gửi</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
<script>
    const socket = io({ transports: ['websocket', 'polling'] });
    let myName = "";

    function join() {
        const input = document.getElementById('user-in');
        if(input.value.trim()) {
            myName = input.value.trim();
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'flex';
        }
    }

    function send() {
        const input = document.getElementById('msg-in');
        if(input.value.trim()) {
            socket.emit('message', { text: input.value, sender_name: myName });
            input.value = "";
        }
    }

    socket.on('render_message', (data) => {
        const isMe = data.sender_name === myName;
        const div = document.createElement('div');
        div.className = `msg ${isMe ? 'sent' : 'received'}`;
        div.innerHTML = `<span class="name">${isMe ? 'Bạn' : data.sender_name}</span>${data.text}`;
        document.getElementById('box').appendChild(div);
        document.getElementById('box').scrollTop = document.getElementById('box').scrollHeight;
    });

    document.getElementById('msg-in').addEventListener('keypress', e => { if(e.key === 'Enter') send() });
</script>
</body>
</html>
