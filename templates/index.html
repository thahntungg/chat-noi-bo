<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat 8A - Kết nối</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0084ff; --bg: #f0f2f5; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* Login Box */
        #login { position: fixed; inset: 0; background: var(--bg); z-index: 10; display: flex; justify-content: center; align-items: center; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        
        /* Chat UI */
        .container { display: none; width: 95%; max-width: 1000px; height: 90vh; background: white; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); flex-direction: column; overflow: hidden; }
        .header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #f9f9f9; }
        
        .msg { max-width: 70%; padding: 10px 15px; border-radius: 18px; font-size: 15px; line-height: 1.4; position: relative; }
        .sent { align-self: flex-end; background: var(--primary); color: white; }
        .received { align-self: flex-start; background: #e4e6eb; color: #1c1e21; }
        .sender { font-size: 11px; color: #65676b; margin-bottom: 2px; display: block; }

        .input-box { padding: 20px; border-top: 1px solid #eee; display: flex; gap: 10px; align-items: center; }
        input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #ddd; outline: none; }
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="login">
    <div class="login-card">
        <h2 style="margin-bottom:20px; color:var(--primary)">Chat 8A 😊</h2>
        <input type="text" id="username" placeholder="Nhập tên của bạn..." style="margin-bottom:15px; width:100%">
        <button onclick="start()" style="width:100%">Vào phòng chat</button>
    </div>
</div>

<div class="container" id="chat-ui">
    <div class="header">
        <h3>Phòng Chat Lớp 8A</h3>
        <span style="color:#27ae60">● Trực tuyến</span>
    </div>
    <div class="messages" id="box"></div>
    <div class="input-box">
        <input type="text" id="msg" placeholder="Nhập tin nhắn... (Gõ :smile: để hiện 😄)" autocomplete="off">
        <button onclick="send()">Gửi</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
<script>
    const socket = io({ transports: ['websocket', 'polling'] });
    let user = "";

    function start() {
        const input = document.getElementById('username');
        if(input.value.trim()) {
            user = input.value.trim();
            document.getElementById('login').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'flex';
        }
    }

    function send() {
        const el = document.getElementById('msg');
        if(el.value.trim()) {
            socket.emit('message', { text: el.value, sender_name: user });
            el.value = "";
        }
    }

    socket.on('render_message', (data) => {
        const isMe = data.sender_name === user;
        const div = document.createElement('div');
        div.className = `msg ${isMe ? 'sent' : 'received'}`;
        div.innerHTML = `<span class="sender">${isMe ? 'Bạn' : data.sender_name}</span>${data.text}`;
        document.getElementById('box').appendChild(div);
        document.getElementById('box').scrollTop = document.getElementById('box').scrollHeight;
    });

    document.getElementById('msg').addEventListener('keypress', e => { if(e.key === 'Enter') send() });
</script>
</body>
</html>
